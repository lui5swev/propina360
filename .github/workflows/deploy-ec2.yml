name: Deploy Propina360 to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend-fastapi
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend-fastapi
        run: PYTHONPATH=. python -m pytest -q

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_APP_DIR: '/opt/propina360'
      PROPINA360_PORT: '18765'
      PROPINA360_SIGNING_KEY: ${{ secrets.PROPINA360_SIGNING_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"
          test -n "$PROPINA360_SIGNING_KEY"

      - name: Prepare SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          if ! grep -qE -- '-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----' ~/.ssh/ec2_key; then
            echo "::error::EC2_SSH_KEY debe incluir el contenido completo del archivo .pem, incluyendo BEGIN/END PRIVATE KEY."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null; then
            echo "::error::EC2_SSH_KEY no es una llave privada SSH valida. Revisa que el secret no tenga texto extra, comillas, prompts de terminal ni saltos de linea perdidos."
            exit 1
          fi

          if ! timeout 15 ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::No se pudo leer el host key de EC2. Revisa EC2_HOST, que la instancia este encendida y que el Security Group permita TCP 22."
            exit 1
          fi

      - name: Prepare runtime environment
        run: |
          printf 'PROPINA360_PORT=%s\n' "$PROPINA360_PORT" > .env
          printf 'PROPINA360_SIGNING_KEY=%s\n' "$PROPINA360_SIGNING_KEY" >> .env

      - name: Upload application bundle
        run: |
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o BatchMode=yes "$EC2_USER@$EC2_HOST" "mkdir -p '$EC2_APP_DIR'"
          tar -czf /tmp/propina360-deploy.tgz Dockerfile docker-compose.yml backend-fastapi .env
          scp -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o BatchMode=yes /tmp/propina360-deploy.tgz "$EC2_USER@$EC2_HOST:/tmp/propina360-deploy.tgz"
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o BatchMode=yes "$EC2_USER@$EC2_HOST" "tar -xzf /tmp/propina360-deploy.tgz -C '$EC2_APP_DIR' && rm /tmp/propina360-deploy.tgz"

      - name: Restart Propina360
        run: |
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o BatchMode=yes "$EC2_USER@$EC2_HOST" "cd '$EC2_APP_DIR' && docker compose up -d --build --remove-orphans && docker image prune -f"

      - name: Health check
        run: |
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o BatchMode=yes "$EC2_USER@$EC2_HOST" "curl -fsS http://127.0.0.1:${PROPINA360_PORT}/api/health"
