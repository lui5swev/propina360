name: Deploy Propina360 to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend-fastapi
        run: pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend-fastapi
        run: PYTHONPATH=. python -m pytest -q

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    env:
      EC2_HOST: 'ec2-18-207-138-22.compute-1.amazonaws.com'
      EC2_USER: 'ubuntu'
      EC2_SSH_KEY: ''
      EC2_APP_DIR: '/opt/propina360'
      PROPINA360_PORT: '18765'
      PROPINA360_SIGNING_KEY: 'c60a591f5c1e57a1f39dd5b6e6a75251d4a232ee829e70b996faf62e5befdf3b'


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"
          test -n "$PROPINA360_SIGNING_KEY"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Prepare runtime environment
        run: |
          printf 'PROPINA360_PORT=%s\n' "$PROPINA360_PORT" > .env
          printf 'PROPINA360_SIGNING_KEY=%s\n' "$PROPINA360_SIGNING_KEY" >> .env

      - name: Upload application bundle
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "mkdir -p '$EC2_APP_DIR'"
          tar -czf /tmp/propina360-deploy.tgz Dockerfile docker-compose.yml backend-fastapi .env
          scp -i ~/.ssh/ec2_key /tmp/propina360-deploy.tgz "$EC2_USER@$EC2_HOST:/tmp/propina360-deploy.tgz"
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "tar -xzf /tmp/propina360-deploy.tgz -C '$EC2_APP_DIR' && rm /tmp/propina360-deploy.tgz"

      - name: Restart Propina360
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "cd '$EC2_APP_DIR' && docker compose up -d --build --remove-orphans && docker image prune -f"

      - name: Health check
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" "curl -fsS http://127.0.0.1:${PROPINA360_PORT}/api/health"
