name: Deploy Propina360 to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate deployment secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          PROPINA360_SIGNING_KEY: ${{ secrets.PROPINA360_SIGNING_KEY }}
        run: |
          set -euo pipefail

          test -n "$EC2_HOST" || { echo "::error::Missing required secret EC2_HOST"; exit 1; }
          test -n "$EC2_USER" || { echo "::error::Missing required secret EC2_USER"; exit 1; }
          test -n "$EC2_SSH_KEY" || { echo "::error::Missing required secret EC2_SSH_KEY"; exit 1; }
          test -n "$PROPINA360_SIGNING_KEY" || { echo "::error::Missing required secret PROPINA360_SIGNING_KEY"; exit 1; }

          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          if ! grep -qE -- '-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----' ~/.ssh/ec2_key; then
            echo "::error::EC2_SSH_KEY must contain the full private key, including BEGIN/END PRIVATE KEY lines."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null; then
            echo "::error::EC2_SSH_KEY is not a valid private SSH key. Check line breaks and remove extra quotes or terminal prompts."
            exit 1
          fi

      - name: Run backend tests
        working-directory: backend-fastapi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          PYTHONPATH=. python -m pytest -q

      - name: Create deploy bundle
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*/__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.db' \
            --exclude='*/.pytest_cache' \
            -czf propina360-deploy.tgz \
            Dockerfile \
            docker-compose.yml \
            backend-fastapi

      - name: Copy bundle to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          source: propina360-deploy.tgz
          target: /tmp

      - name: Deploy on EC2 with Docker
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ROOT: ${{ vars.EC2_APP_DIR || '/opt/propina360' }}
          PROPINA360_PORT: ${{ vars.PROPINA360_PORT || '18765' }}
          PROPINA360_SIGNING_KEY: ${{ secrets.PROPINA360_SIGNING_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          envs: APP_ROOT,PROPINA360_PORT,PROPINA360_SIGNING_KEY
          script: |
            set -euo pipefail

            : "${PROPINA360_SIGNING_KEY:?Missing required GitHub secret PROPINA360_SIGNING_KEY}"
            : "${PROPINA360_PORT:=18765}"
            : "${APP_ROOT:=/opt/propina360}"

            CURRENT_DIR="$APP_ROOT/current"
            RELEASE_DIR="$APP_ROOT/release"
            ARCHIVE=/tmp/propina360-deploy.tgz

            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER" || true
            fi

            sudo systemctl enable docker || true
            sudo systemctl start docker

            docker_cmd() {
              if docker info >/dev/null 2>&1; then
                docker "$@"
              else
                sudo docker "$@"
              fi
            }

            if ! docker_cmd compose version >/dev/null 2>&1; then
              arch="$(uname -m)"
              case "$arch" in
                x86_64|amd64) compose_arch=x86_64 ;;
                aarch64|arm64) compose_arch=aarch64 ;;
                *) echo "Unsupported architecture for Docker Compose plugin: $arch" >&2; exit 1 ;;
              esac

              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL \
                "https://github.com/docker/compose/releases/download/v2.39.2/docker-compose-linux-${compose_arch}" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi

            sudo mkdir -p "$APP_ROOT"
            sudo chown -R "$USER":"$USER" "$APP_ROOT"

            if [ -d "$CURRENT_DIR" ]; then
              cd "$CURRENT_DIR"
              docker_cmd compose down --remove-orphans || true
            fi

            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"
            tar -xzf "$ARCHIVE" -C "$RELEASE_DIR"

            rm -rf "$CURRENT_DIR"
            mv "$RELEASE_DIR" "$CURRENT_DIR"
            cd "$CURRENT_DIR"

            umask 077
            cat > .env <<EOF
            PROPINA360_PORT=$PROPINA360_PORT
            PROPINA360_SIGNING_KEY=$PROPINA360_SIGNING_KEY
            EOF

            docker_cmd container prune -f || true
            docker_cmd compose up -d --build --remove-orphans

            sleep 10
            docker_cmd compose ps
            curl --fail --silent --show-error "http://127.0.0.1:${PROPINA360_PORT}/api/health"
